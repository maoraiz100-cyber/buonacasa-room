<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="index, follow">
<title>Buona Casa — עצב את הבית שלך לפני הקנייה</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
:root{
  --cream:#FAF8F5;
  --white:#FFFFFF;
  --ink:#1A1A1A;
  --ink-soft:#555555;
  --ink-muted:#999999;
  --accent:#C8502A;
  --accent-light:#F0E8E4;
  --border:#E8E4DE;
  --shadow:0 2px 16px rgba(0,0,0,0.08);
  --shadow-lg:0 8px 40px rgba(0,0,0,0.14);
  --radius:12px;
  --radius-sm:8px;
}
html,body{height:100%;font-family:'Heebo',sans-serif;direction:rtl;background:var(--cream);color:var(--ink);overflow:hidden;}
::-webkit-scrollbar{width:4px;height:4px;}
::-webkit-scrollbar-track{background:transparent;}
::-webkit-scrollbar-thumb{background:var(--border);border-radius:4px;}

/* ── HEADER ── */
#hdr{
  height:58px;background:var(--white);border-bottom:1px solid var(--border);
  display:flex;align-items:center;justify-content:space-between;
  padding:0 16px;position:relative;z-index:50;flex-shrink:0;
  box-shadow:0 1px 0 var(--border);
}
.logo-wrap{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-sq{
  width:34px;height:34px;background:var(--ink);border-radius:9px;
  display:flex;align-items:center;justify-content:center;
  color:var(--white);font-size:12px;font-weight:800;letter-spacing:-0.5px;
  flex-shrink:0;
}
.logo-name{font-size:15px;font-weight:700;color:var(--ink);line-height:1.1;}
.logo-tag{font-size:10px;color:var(--ink-muted);line-height:1;}
.hdr-btns{display:flex;gap:8px;align-items:center;}
.hbtn{
  height:36px;padding:0 13px;border-radius:var(--radius-sm);
  font-family:'Heebo',sans-serif;font-size:12px;font-weight:500;
  cursor:pointer;display:inline-flex;align-items:center;gap:6px;
  white-space:nowrap;border:none;transition:opacity .15s;touch-action:manipulation;
}
.hbtn:hover{opacity:.85;}
.hbtn-outline{background:var(--accent-light);color:var(--accent);border:1px solid rgba(200,80,42,.2);}
.hbtn-dark{background:var(--ink);color:var(--white);}
.cart-badge{
  background:var(--accent);color:var(--white);border-radius:50%;
  width:18px;height:18px;font-size:10px;display:flex;
  align-items:center;justify-content:center;font-weight:700;flex-shrink:0;
}
.back-btn{font-size:12px;color:var(--ink-muted);text-decoration:none;display:flex;align-items:center;gap:3px;}
.back-btn:hover{color:var(--ink);}

/* ── LAYOUT ── */
#app{display:flex;height:calc(100vh - 58px);overflow:hidden;}

/* ── SIDEBAR ── */
#sidebar{
  width:280px;background:var(--white);border-left:1px solid var(--border);
  display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;
}

/* Tabs */
.tabs{display:flex;border-bottom:1px solid var(--border);flex-shrink:0;}
.tab{
  flex:1;padding:11px 4px;border:none;background:var(--white);
  font-family:'Heebo',sans-serif;font-size:11.5px;font-weight:400;
  color:var(--ink-muted);cursor:pointer;border-bottom:2.5px solid transparent;
  transition:all .15s;touch-action:manipulation;
}
.tab.on{background:var(--cream);color:var(--ink);font-weight:600;border-bottom-color:var(--ink);}

/* Categories */
.cats{padding:10px 12px 8px;overflow-x:auto;white-space:nowrap;border-bottom:1px solid var(--border);flex-shrink:0;}
.cats::-webkit-scrollbar{display:none;}
.cat{
  display:inline-block;padding:4px 11px;border-radius:20px;
  border:1px solid var(--border);background:var(--white);
  font-family:'Heebo',sans-serif;font-size:11px;color:var(--ink-soft);
  cursor:pointer;margin-left:5px;transition:all .15s;touch-action:manipulation;
}
.cat.on{background:var(--ink);color:var(--white);border-color:var(--ink);}

/* Product list */
#prod-list{flex:1;overflow-y:auto;padding:6px 12px 12px;-webkit-overflow-scrolling:touch;}
.pcard{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid var(--border);align-items:center;}
.pcard:last-child{border-bottom:none;}
.pthumb{width:56px;height:56px;object-fit:contain;border-radius:var(--radius-sm);background:var(--cream);flex-shrink:0;padding:4px;}
.pinfo{flex:1;min-width:0;}
.pname{font-size:11.5px;font-weight:500;color:var(--ink);line-height:1.3;margin-bottom:2px;}
.pprice{font-size:12px;color:var(--accent);font-weight:700;}
.pbtns{display:flex;gap:4px;margin-top:5px;}
.pbtn{
  padding:4px 8px;border-radius:6px;font-family:'Heebo',sans-serif;
  font-size:10px;font-weight:500;cursor:pointer;touch-action:manipulation;border:none;
  transition:all .15s;
}
.pbtn-place{background:var(--ink);color:var(--white);}
.pbtn-place:hover{background:#333;}
.pbtn-cart{background:var(--accent);color:var(--white);}
.pbtn-cart:hover{background:#b3451f;}

/* Placed list */
#placed-list{flex:1;overflow-y:auto;padding:6px 12px 12px;-webkit-overflow-scrolling:touch;}
.plcard{padding:8px 4px;border-bottom:1px solid var(--border);}
.plcard:last-child{border-bottom:none;}
.pl-inner{display:flex;gap:9px;align-items:center;cursor:pointer;}
.pl-thumb{width:46px;height:46px;object-fit:contain;border-radius:6px;background:var(--cream);flex-shrink:0;padding:3px;}
.pl-name{font-size:11.5px;font-weight:500;color:var(--ink);line-height:1.3;}
.pl-size{font-size:10px;color:var(--ink-muted);margin-top:1px;}
.pl-rmv{border:none;background:transparent;font-size:17px;color:var(--border);cursor:pointer;padding:5px;touch-action:manipulation;}
.pl-rmv:hover{color:var(--accent);}
.pl-ctrl{padding:7px 0 3px;display:none;}
.pl-ctrl.show{display:block;}
.ctrl-lbl{font-size:10px;color:var(--ink-muted);margin-bottom:3px;}
input[type=range]{width:100%;accent-color:var(--accent);cursor:pointer;}
.pl-add-btn{
  width:100%;margin-top:6px;padding:7px 0;border-radius:var(--radius-sm);
  border:none;background:var(--accent);color:var(--white);
  font-family:'Heebo',sans-serif;font-size:11.5px;font-weight:500;cursor:pointer;touch-action:manipulation;
}
.pl-add-btn:hover{background:#b3451f;}
.empty-st{text-align:center;color:var(--border);padding:36px 12px;font-size:12.5px;line-height:1.7;}
.empty-icon{font-size:36px;margin-bottom:8px;}

/* Presets */
#presets-bar{border-top:1px solid var(--border);padding:10px 12px;flex-shrink:0;}
.presets-lbl{font-size:10px;color:var(--ink-muted);margin-bottom:7px;}
.presets-row{display:flex;gap:6px;flex-wrap:wrap;}
.preset{
  padding:5px 11px;border-radius:var(--radius-sm);
  border:1.5px solid var(--border);background:var(--white);
  font-family:'Heebo',sans-serif;font-size:11px;color:var(--ink-soft);
  cursor:pointer;touch-action:manipulation;transition:all .15s;
}
.preset.on{border-color:var(--ink);background:var(--accent-light);font-weight:600;color:var(--ink);}

/* ── CANVAS ── */
#cvs-wrap{flex:1;position:relative;overflow:hidden;}
#room-cvs{
  width:100%;height:100%;position:relative;overflow:hidden;
  background:#F0ECE4;background-size:cover;background-position:center;
  touch-action:none;
}
#hint{
  position:absolute;top:12px;left:50%;transform:translateX(-50%);
  z-index:20;background:rgba(255,255,255,.93);backdrop-filter:blur(8px);
  border-radius:20px;padding:6px 16px;font-size:11.5px;color:var(--ink-soft);
  box-shadow:var(--shadow);white-space:nowrap;pointer-events:none;
  max-width:90%;text-align:center;border:1px solid var(--border);
}
.room-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:6px;}
.room-ph-icon{font-size:80px;opacity:.12;}
.room-ph-txt{font-size:13px;color:rgba(0,0,0,.18);}

/* ── PLACED ITEMS ── */
.item{position:absolute;touch-action:none;user-select:none;}
.item img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;filter:drop-shadow(0 4px 16px rgba(0,0,0,.18));}
.item-ring{position:absolute;inset:-3px;border:2.5px solid transparent;border-radius:5px;pointer-events:none;}
.item.sel .item-ring{border-color:var(--accent);}
.item-lbl{position:absolute;bottom:calc(100%+5px);right:0;background:var(--ink);color:var(--white);font-size:9px;padding:2px 7px;border-radius:4px;white-space:nowrap;display:none;font-family:'Heebo',sans-serif;}
.item.sel .item-lbl{display:block;}
.item-del{position:absolute;top:-11px;right:-11px;width:24px;height:24px;border-radius:50%;border:none;background:var(--accent);color:var(--white);font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:10;touch-action:manipulation;}
.item.sel .item-del{display:flex;}
.item-resize{position:absolute;bottom:-7px;left:-7px;width:16px;height:16px;border-radius:50%;background:var(--white);border:2px solid var(--accent);cursor:se-resize;display:none;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:10;}
.item.sel .item-resize{display:block;}
.item-rot-l,.item-rot-r{position:absolute;bottom:-14px;width:22px;height:22px;border-radius:50%;border:none;background:var(--white);color:var(--ink);font-size:13px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:10;touch-action:manipulation;padding:0;line-height:1;border:1.5px solid var(--border);}
.item-rot-l{right:28px;}
.item-rot-r{right:2px;}
.item.sel .item-rot-l,.item.sel .item-rot-r{display:flex;}
.item-pinch{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:var(--accent);white-space:nowrap;display:none;background:rgba(255,255,255,.88);padding:1px 7px;border-radius:10px;pointer-events:none;}
.item.sel .item-pinch{display:block;}

/* ── MOBILE FAB ── */
#fab{
  position:fixed;bottom:20px;left:50%;transform:translateX(-50%);
  z-index:150;background:var(--ink);color:var(--white);border:none;
  border-radius:30px;padding:14px 26px;font-family:'Heebo',sans-serif;
  font-size:14px;font-weight:600;cursor:pointer;
  box-shadow:0 4px 24px rgba(0,0,0,.35);display:none;
  align-items:center;gap:8px;touch-action:manipulation;white-space:nowrap;
}

/* ── BOTTOM SHEET (mobile) ── */
#sbd{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
#sbd.show{opacity:1;pointer-events:auto;}
#bsheet{
  position:fixed;bottom:0;left:0;right:0;background:var(--white);
  border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);
  transition:transform .3s cubic-bezier(.32,1,.23,1);
  max-height:80vh;display:flex;flex-direction:column;
  box-shadow:0 -4px 32px rgba(0,0,0,.18);
}
#bsheet.open{transform:translateY(0);}
.bs-handle-row{padding:10px 0 0;display:flex;justify-content:center;flex-shrink:0;}
.bs-handle{width:36px;height:4px;background:var(--border);border-radius:2px;}
.bs-hdr{padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.bs-title{font-size:16px;font-weight:700;}
.bs-x{border:none;background:transparent;font-size:22px;color:var(--border);cursor:pointer;padding:4px;touch-action:manipulation;}
.bs-tabs{display:flex;padding:10px 14px 0;gap:7px;flex-shrink:0;}
.bstab{
  flex:1;padding:8px 4px;border:none;background:var(--cream);
  border-radius:10px;font-family:'Heebo',sans-serif;font-size:11.5px;
  font-weight:500;color:var(--ink-muted);cursor:pointer;transition:all .15s;touch-action:manipulation;
}
.bstab.on{background:var(--ink);color:var(--white);}
.m-cats{padding:10px 14px 0;overflow-x:auto;white-space:nowrap;flex-shrink:0;}
.m-cats::-webkit-scrollbar{display:none;}
.m-cat{
  display:inline-block;padding:5px 13px;border-radius:20px;
  border:1px solid var(--border);background:var(--white);
  font-family:'Heebo',sans-serif;font-size:11.5px;color:var(--ink-soft);
  cursor:pointer;margin-left:6px;transition:all .15s;touch-action:manipulation;
}
.m-cat.on{background:var(--ink);color:var(--white);border-color:var(--ink);}
#m-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 24px;display:grid;grid-template-columns:1fr 1fr;gap:10px;}
#m-grid::-webkit-scrollbar{display:none;}
.mgcard{background:var(--white);border-radius:14px;overflow:hidden;display:flex;flex-direction:column;border:1px solid var(--border);min-height:210px;}
.mgimg{width:100%;height:120px;background:var(--cream);display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;}
.mgimg img{max-width:85%;max-height:85%;width:auto;height:auto;object-fit:contain;display:block;margin:auto;}
.mgbody{padding:8px 10px 16px;direction:rtl;text-align:right;}
.mgname{font-size:12.5px;font-weight:500;color:var(--ink);line-height:1.35;margin-bottom:4px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.mgprice{font-size:13px;color:var(--accent);font-weight:700;margin-bottom:6px;}
.mgbtns{display:flex;gap:4px;margin-top:6px;}
.mgbtn{padding:8px 8px;border-radius:8px;font-family:'Heebo',sans-serif;font-size:11px;font-weight:500;cursor:pointer;border:none;text-align:center;touch-action:manipulation;white-space:nowrap;flex:1;}
.mgbtn-place{background:var(--ink);color:var(--white);}
.mgbtn-cart{background:var(--accent);color:var(--white);}
#m-placed{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 14px 24px;}
#m-placed::-webkit-scrollbar{display:none;}
.m-prs-wrap{flex:1;overflow-y:auto;padding:12px 14px 24px;}
.m-prs-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
.m-prs{padding:14px 0;border-radius:12px;border:1.5px solid var(--border);background:var(--white);font-family:'Heebo',sans-serif;font-size:13px;color:var(--ink-soft);cursor:pointer;text-align:center;touch-action:manipulation;transition:all .15s;}
.m-prs.on{border-color:var(--ink);background:var(--accent-light);font-weight:600;color:var(--ink);}
.m-upload-lbl{display:block;width:100%;padding:14px 0;border-radius:12px;border:1.5px dashed var(--border);background:var(--cream);text-align:center;font-size:13px;color:var(--ink-soft);cursor:pointer;touch-action:manipulation;}

/* ── CART ── */
#cart-ov{position:fixed;inset:0;z-index:400;display:flex;opacity:0;pointer-events:none;transition:opacity .2s;}
#cart-ov.open{opacity:1;pointer-events:auto;}
#cart-bk{flex:1;background:rgba(0,0,0,.32);}
#cart-pnl{width:min(340px,94vw);background:var(--white);display:flex;flex-direction:column;padding:20px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:-4px 0 28px rgba(0,0,0,.14);}
.cd-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.cd-title{font-size:17px;font-weight:700;}
.cd-x{border:none;background:transparent;font-size:22px;color:var(--ink-muted);cursor:pointer;touch-action:manipulation;}
.citem{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid var(--border);align-items:center;}
.citem:last-child{border-bottom:none;}
.cimg{width:48px;height:48px;object-fit:contain;border-radius:var(--radius-sm);background:var(--cream);flex-shrink:0;padding:3px;}
.cname{font-size:12px;font-weight:500;color:var(--ink);line-height:1.3;}
.cprice{font-size:12px;color:var(--accent);font-weight:600;margin-top:2px;}
.cqty{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.qbtn{width:26px;height:26px;border-radius:50%;border:1px solid var(--border);background:var(--white);font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.qnum{font-size:13px;font-weight:500;min-width:18px;text-align:center;}
.crm{border:none;background:transparent;font-size:15px;color:var(--border);cursor:pointer;padding:5px;touch-action:manipulation;}
.crm:hover{color:var(--accent);}
.cart-foot{margin-top:16px;border-top:1px solid var(--border);padding-top:16px;}
.cart-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:14px;}
.cart-total-amt{color:var(--accent);}
.btn-checkout{display:block;width:100%;padding:14px 0;border-radius:var(--radius);background:var(--ink);color:var(--white);text-align:center;text-decoration:none;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;transition:opacity .15s;}
.btn-checkout:hover{opacity:.88;}
.cart-empty-msg{text-align:center;color:var(--border);padding:40px 0;font-size:13px;}

/* ── RESPONSIVE ── */
@media(max-width:700px){
  #sidebar{display:none;}
  #fab{display:flex;}
  .back-btn{display:none;}
  #upload-hdr span{display:none;}
}
@media(min-width:701px){
  #fab{display:none;}
  #bsheet{display:none!important;}
  #sbd{display:none!important;}
  .item-pinch{display:none!important;}
}
</style>
</head>
<body>

<input type="file" id="file-in" accept="image/*" capture="environment" onchange="handleUpload(event)" style="display:none">

<!-- HEADER -->
<div id="hdr">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="https://buonacasa.co.il" class="back-btn">← חנות</a>
    <a href="https://buonacasa.co.il" class="logo-wrap">
      <div class="logo-sq">BC</div>
      <div>
        <div class="logo-name">Buona Casa</div>
        <div class="logo-tag">מעצב החלל שלך</div>
      </div>
    </a>
  </div>
  <div class="hdr-btns">
    <button id="upload-hdr" class="hbtn hbtn-outline" onclick="document.getElementById('file-in').click()">📷 <span>העלה תמונה</span></button>
    <button class="hbtn hbtn-dark" onclick="openCart()">🛒 <span class="cart-badge" id="cart-cnt" style="display:none">0</span></button>
  </div>
</div>

<!-- APP -->
<div id="app">

  <!-- DESKTOP SIDEBAR -->
  <div id="sidebar">
    <div class="tabs">
      <button class="tab on" id="tab-cat" onclick="switchTab('cat')">🛍️ קטלוג</button>
      <button class="tab" id="tab-placed" onclick="switchTab('placed')">✏️ בחלל (<span id="placed-cnt">0</span>)</button>
    </div>
    <div id="panel-cat" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
      <div class="cats" id="d-cats"></div>
      <div id="prod-list"></div>
    </div>
    <div id="panel-placed" style="display:none;flex:1;overflow-y:auto;">
      <div id="placed-list" style="padding:6px 12px 12px;"></div>
    </div>
    <div id="presets-bar">
      <div class="presets-lbl">רקע חדר</div>
      <div class="presets-row" id="d-presets"></div>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="cvs-wrap">
    <div id="room-cvs">
      <div class="room-ph" id="room-ph">
        <div class="room-ph-icon" id="ph-icon">🛋️</div>
        <div class="room-ph-txt">העלה תמונת חדר או בחר מוצר להתחיל</div>
      </div>
    </div>
    <div id="hint">👇 בחר מוצר ולחץ "שים בחדר" — ואז גרור לאן שתרצה</div>
  </div>
</div>

<!-- FAB -->
<button id="fab" onclick="openSheet()">🛍️ מוצרים</button>

<!-- SHEET BACKDROP -->
<div id="sbd" onclick="closeSheet()"></div>

<!-- BOTTOM SHEET -->
<div id="bsheet">
  <div class="bs-handle-row"><div class="bs-handle"></div></div>
  <div class="bs-hdr">
    <div class="bs-title">בחר מוצר</div>
    <button class="bs-x" onclick="closeSheet()">✕</button>
  </div>
  <div class="bs-tabs">
    <button class="bstab on" id="bstab-cat" onclick="switchBsTab('cat')">🛍️ קטלוג</button>
    <button class="bstab" id="bstab-placed" onclick="switchBsTab('placed')">✏️ בחלל (<span id="m-placed-cnt">0</span>)</button>
    <button class="bstab" id="bstab-room" onclick="switchBsTab('room')">🏠 חדר</button>
  </div>
  <div id="bsp-cat" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="m-cats" id="m-cats"></div>
    <div id="m-grid"></div>
  </div>
  <div id="bsp-placed" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
    <div id="m-placed"></div>
  </div>

const PRESETS=[{label:"סלון",emoji:"🛋️",bg:"#F0ECE4"},{label:"מטבח",emoji:"🍳",bg:"#E8F0E9"},{label:"חדר שינה",emoji:"🛏️",bg:"#ECE8F0"},{label:"אמבטיה",emoji:"🚿",bg:"#E4ECF0"}];
const CATS=['הכל',...[...new Set(PRODUCTS.map(p=>p.cat))]];

const S={items:[],cart:[],selId:null,dTab:'cat',mTab:'cat',dCat:'הכל',mCat:'הכל',preset:PRESETS[0],roomImg:null,ctr:1,drag:null,resize:null};

function init(){
  renderDCats();renderDProds();renderDPresets();
  renderMCats();renderMProds();renderMPresets();
  applyPreset(S.preset);
  setupMouse();setupSheetSwipe();
  document.getElementById('room-cvs').addEventListener('mousedown',e=>{
    if(e.target.id==='room-cvs'||e.target.classList.contains('room-ph')||e.target.classList.contains('room-ph-icon')||e.target.classList.contains('room-ph-txt')){deselectAll();}
  });
  document.getElementById('room-cvs').addEventListener('touchend',e=>{
    if(e.target.id==='room-cvs'||e.target.classList.contains('room-ph')){deselectAll();}
  },{passive:true});
}

function handleUpload(e){
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f);S.roomImg=url;
  const c=document.getElementById('room-cvs');
  c.style.backgroundImage=`url(${url})`;c.style.backgroundColor='';
  document.getElementById('room-ph').style.display='none';
  renderDPresets();renderMPresets();
}

function applyPreset(p,close){
  S.preset=p;S.roomImg=null;
  const c=document.getElementById('room-cvs');
  c.style.backgroundImage='none';c.style.backgroundColor=p.bg;
  document.getElementById('ph-icon').textContent=p.emoji;
  document.getElementById('room-ph').style.display='flex';
  renderDPresets();renderMPresets();
  if(close)closeSheet();
}

function renderDCats(){document.getElementById('d-cats').innerHTML=CATS.map(c=>`<span class="cat${c===S.dCat?' on':''}" onclick="selDCat('${c}')">${c}</span>`).join('');}
function selDCat(c){S.dCat=c;renderDCats();renderDProds();}
function renderMCats(){document.getElementById('m-cats').innerHTML=CATS.map(c=>`<span class="m-cat${c===S.mCat?' on':''}" onclick="selMCat('${c}')">${c}</span>`).join('');}
function selMCat(c){S.mCat=c;renderMCats();renderMProds();}

function renderDProds(){
  const list=S.dCat==='הכל'?PRODUCTS:PRODUCTS.filter(p=>p.cat===S.dCat);
  const el=document.getElementById('prod-list');
  el.innerHTML=list.map(p=>`<div class="pcard">
    <img class="pthumb" src="${p.img}" alt="${p.name}" loading="lazy" onerror="this.style.opacity='.3'">
    <div class="pinfo">
      <div class="pname">${p.name}</div>
      <div class="pprice">₪${p.price.toLocaleString()}</div>
      <div class="pbtns">
        <button class="pbtn pbtn-place" data-pid="${p.id}" data-act="place">+ שים בחדר</button>
        <button class="pbtn pbtn-cart" data-pid="${p.id}" data-act="cart">+ סל</button>
      </div>
    </div>
  </div>`).join('');
  el.onclick=handleProdClick;
}

function renderMProds(){
  const list=S.mCat==='הכל'?PRODUCTS:PRODUCTS.filter(p=>p.cat===S.mCat);
  const el=document.getElementById('m-grid');
  el.innerHTML=list.map(p=>`<div class="mgcard">
    <div class="mgimg"><img src="${p.img}" alt="${p.name}" loading="eager" onerror="this.style.opacity='.3'"></div>
    <div class="mgbody">
      <div class="mgname">${p.name}</div>
      <div class="mgprice">₪${p.price.toLocaleString()}</div>
      <div class="mgbtns">
        <button class="mgbtn mgbtn-place" data-pid="${p.id}" data-act="place" data-mob="1">+ חדר</button>
        <button class="mgbtn mgbtn-cart" data-pid="${p.id}" data-act="cart">+ סל</button>
      </div>
    </div>
  </div>`).join('');
  el.onclick=handleProdClick;
}

function handleProdClick(e){
  const btn=e.target.closest('[data-act]');if(!btn)return;
  const p=PRODUCTS.find(x=>x.id===btn.dataset.pid);if(!p)return;
  if(btn.dataset.act==='place')place(p,btn.dataset.mob==='1');
  else addCart(p);
}

function renderDPresets(){
  const el=document.getElementById('d-presets');
  el.innerHTML=PRESETS.map(p=>`<span class="preset${p.label===S.preset.label&&!S.roomImg?' on':''}" data-act="preset" data-label="${p.label}">${p.emoji} ${p.label}</span>`).join('');
  el.onclick=e=>{const b=e.target.closest('[data-act="preset"]');if(b){const p=PRESETS.find(x=>x.label===b.dataset.label);if(p)applyPreset(p);}};
}

function renderMPresets(){
  const el=document.getElementById('m-presets');
  el.innerHTML=PRESETS.map(p=>`<button class="m-prs${p.label===S.preset.label&&!S.roomImg?' on':''}" data-act="preset" data-label="${p.label}">${p.emoji}<br>${p.label}</button>`).join('');
  el.onclick=e=>{const b=e.target.closest('[data-act="preset"]');if(b){const p=PRESETS.find(x=>x.label===b.dataset.label);if(p)applyPreset(p,true);}};
}

function place(p,isMob){
  const cvs=document.getElementById('room-cvs');
  const rect=cvs.getBoundingClientRect();
  const scale=isMob?Math.min(1,rect.width/380)*1.1:1;
  const item={id:S.ctr++,p,x:Math.round((rect.width-p.w*scale)/2),y:Math.round((rect.height-p.h*scale)/2),w:Math.round(p.w*scale),h:Math.round(p.h*scale),opacity:1,rot:0};
  S.items.push(item);S.selId=item.id;
  mountItem(item);updateCnts();updateHint();
  if(isMob)closeSheet();
}

function mountItem(item){
  const cvs=document.getElementById('room-cvs');
  const div=document.createElement('div');
  div.className='item sel';div.id=`item-${item.id}`;
  div.style.cssText=`left:${item.x}px;top:${item.y}px;width:${item.w}px;height:${item.h}px;opacity:${item.opacity};transform:rotate(${item.rot}deg);transform-origin:center center;`;
  div.innerHTML=`<img src="${item.p.img}" alt="${item.p.name}" draggable="false" referrerpolicy="no-referrer">
    <div class="item-ring"></div>
    <div class="item-lbl">${item.p.name}</div>
    <div class="item-pinch">🤏 צבט לשינוי גודל</div>
    <button class="item-del" onclick="removeItem(${item.id})" ontouchend="removeItem(${item.id})">✕</button>
    <div class="item-resize" data-id="${item.id}"></div>
    <button class="item-rot-l" onclick="rotItem(${item.id},-15)" ontouchend="rotItem(${item.id},-15)">↺</button>
    <button class="item-rot-r" onclick="rotItem(${item.id},15)" ontouchend="rotItem(${item.id},15)">↻</button>`;
  div.addEventListener('mousedown',e=>onItemDown(e,item.id));
  div.querySelector('.item-resize').addEventListener('mousedown',e=>onResizeDown(e,item.id));
  attachTouch(div,item.id);
  cvs.appendChild(div);
  deselectAll();div.classList.add('sel');
  renderBothPlaced();
}

function removeItem(id){
  S.items=S.items.filter(it=>it.id!==id);
  const el=document.getElementById(`item-${id}`);if(el)el.remove();
  if(S.selId===id)S.selId=null;
  updateCnts();renderBothPlaced();updateHint();
}

function deselectAll(){document.querySelectorAll('.item').forEach(el=>el.classList.remove('sel'));S.selId=null;}
function selectItem(id){deselectAll();S.selId=id;const el=document.getElementById(`item-${id}`);if(el)el.classList.add('sel');renderBothPlaced();}

function rotItem(id,deg){
  const item=S.items.find(it=>it.id===id);if(!item)return;
  item.rot=(item.rot||0)+deg;
  const el=document.getElementById(`item-${id}`);if(el)el.style.transform=`rotate(${item.rot}deg)`;
}

function onItemDown(e,id){
  if(e.button!==0)return;e.stopPropagation();selectItem(id);
  const el=document.getElementById(`item-${id}`);
  const r=el.getBoundingClientRect();
  const cr=document.getElementById('room-cvs').getBoundingClientRect();
  S.drag={id,ox:e.clientX-(r.left-cr.left),oy:e.clientY-(r.top-cr.top)};
}
function onResizeDown(e,id){
  e.stopPropagation();e.preventDefault();
  const item=S.items.find(it=>it.id===id);
  S.resize={id,sx:e.clientX,sy:e.clientY,sw:item.w,sh:item.h};
}
function setupMouse(){
  document.addEventListener('mousemove',e=>{
    if(S.drag){
      const item=S.items.find(it=>it.id===S.drag.id);if(!item)return;
      const cr=document.getElementById('room-cvs').getBoundingClientRect();
      item.x=Math.max(0,Math.min(cr.width-item.w,e.clientX-cr.left-S.drag.ox));
      item.y=Math.max(0,Math.min(cr.height-item.h,e.clientY-cr.top-S.drag.oy));
      const el=document.getElementById(`item-${item.id}`);
      if(el){el.style.left=item.x+'px';el.style.top=item.y+'px';}
      updSize(item);
    }
    if(S.resize){
      const item=S.items.find(it=>it.id===S.resize.id);if(!item)return;
      item.w=Math.max(40,S.resize.sw+(e.clientX-S.resize.sx));
      item.h=Math.max(40,S.resize.sh+(e.clientY-S.resize.sy));
      const el=document.getElementById(`item-${item.id}`);
      if(el){el.style.width=item.w+'px';el.style.height=item.h+'px';}
      updSize(item);
    }
  });
  document.addEventListener('mouseup',()=>{S.drag=null;S.resize=null;});
}

function attachTouch(div,id){
  let sx=null,sy=null,sd=null,sw=null,sh=null;
  div.addEventListener('touchstart',e=>{
    e.stopPropagation();selectItem(id);
    const item=S.items.find(it=>it.id===id);if(!item)return;
    const t=e.touches;
    if(t.length===1){
      const el=document.getElementById(`item-${id}`);
      const r=el.getBoundingClientRect();
      const cr=document.getElementById('room-cvs').getBoundingClientRect();
      sx=t[0].clientX-(r.left-cr.left);sy=t[0].clientY-(r.top-cr.top);
    } else if(t.length===2){
      const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;
      sd=Math.sqrt(dx*dx+dy*dy);sw=item.w;sh=item.h;sx=null;
    }
  },{passive:true});
  div.addEventListener('touchmove',e=>{
    e.preventDefault();e.stopPropagation();
    const item=S.items.find(it=>it.id===id);if(!item)return;
    const el=document.getElementById(`item-${id}`);if(!el)return;
    const cr=document.getElementById('room-cvs').getBoundingClientRect();
    const t=e.touches;
    if(t.length===1&&sx!==null){
      item.x=Math.max(0,Math.min(cr.width-item.w,t[0].clientX-cr.left-sx));
      item.y=Math.max(0,Math.min(cr.height-item.h,t[0].clientY-cr.top-sy));
      el.style.left=item.x+'px';el.style.top=item.y+'px';
    } else if(t.length===2&&sd){
      const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;
      const r=Math.sqrt(dx*dx+dy*dy)/sd;
      item.w=Math.max(40,Math.round(sw*r));item.h=Math.max(40,Math.round(sh*r));
      el.style.width=item.w+'px';el.style.height=item.h+'px';
    }
    updSize(item);
  },{passive:false});
  div.addEventListener('touchend',e=>{
    if(e.touches.length===0){sx=null;sd=null;}
    if(e.touches.length===1&&sd){
      const el=document.getElementById(`item-${id}`);
      const r=el.getBoundingClientRect();
      const cr=document.getElementById('room-cvs').getBoundingClientRect();
      sx=e.touches[0].clientX-(r.left-cr.left);sy=e.touches[0].clientY-(r.top-cr.top);sd=null;
    }
  },{passive:true});
}

function updSize(item){document.querySelectorAll(`#psize-${item.id}`).forEach(el=>el.textContent=`${Math.round(item.w)}×${Math.round(item.h)}`);}

function placedHTML(item){
  return `<div class="plcard" id="plc-${item.id}">
    <div class="pl-inner" onclick="selectItem(${item.id})">
      <img class="pl-thumb" src="${item.p.img}" alt="${item.p.name}" referrerpolicy="no-referrer">
      <div class="pl-info">
        <div class="pl-name">${item.p.name}</div>
        <div class="pl-size" id="psize-${item.id}">${Math.round(item.w)}×${Math.round(item.h)}</div>
      </div>
      <button class="pl-rmv" onclick="removeItem(${item.id})">✕</button>
    </div>
    <div class="pl-ctrl${S.selId===item.id?' show':''}">
      <div class="ctrl-lbl">שקיפות</div>
      <input type="range" min="0.15" max="1" step="0.05" value="${item.opacity}" oninput="setOpacity(${item.id},this.value)">
      <button class="pl-add-btn" data-pid="${item.p.id}" data-act="cart-placed">הוסף לסל — ₪${item.p.price.toLocaleString()}</button>
    </div>
  </div>`;
}

function renderBothPlaced(){renderDPlaced();renderMPlaced();}
function emptyPlaced(){return '<div class="empty-st"><div class="empty-icon">✨</div>עדיין לא הנחת מוצרים</div>';}

function renderDPlaced(){
  const el=document.getElementById('placed-list');
  if(!S.items.length){el.innerHTML=emptyPlaced();return;}
  el.innerHTML=S.items.map(placedHTML).join('');
  el.onclick=handlePlacedClick;
}
function renderMPlaced(){
  const el=document.getElementById('m-placed');
  if(!S.items.length){el.innerHTML=emptyPlaced();return;}
  el.innerHTML=S.items.map(placedHTML).join('');
  el.onclick=handlePlacedClick;
}
function handlePlacedClick(e){
  const btn=e.target.closest('[data-act="cart-placed"]');
  if(!btn)return;
  const item=S.items.find(it=>it.p.id===btn.dataset.pid);
  if(item)addCart(item.p);
}
function setOpacity(id,v){
  const item=S.items.find(it=>it.id===id);if(!item)return;
  item.opacity=parseFloat(v);
  const el=document.getElementById(`item-${id}`);if(el)el.style.opacity=v;
}

function switchTab(t){
  S.dTab=t;
  ['cat','placed'].forEach(x=>{
    document.getElementById(`tab-${x}`).className='tab'+(x===t?' on':'');
  });
  document.getElementById('panel-cat').style.display=t==='cat'?'block':'none';
  document.getElementById('panel-placed').style.display=t==='placed'?'block':'none';
  if(t==='placed')renderDPlaced();
}
function switchBsTab(t){
  S.mTab=t;
  ['cat','placed','room'].forEach(x=>{
    document.getElementById(`bstab-${x}`).className='bstab'+(x===t?' on':'');
    document.getElementById(`bsp-${x}`).style.display=x===t?'flex':'none';
  });
  if(t==='cat')document.getElementById('bsp-cat').style.display='flex';
  if(t==='placed'){document.getElementById('bsp-placed').style.display='flex';renderMPlaced();}
  if(t==='room')document.getElementById('bsp-room').style.display='flex';
}

function updateCnts(){
  const n=S.items.length;
  document.getElementById('placed-cnt').textContent=n;
  document.getElementById('m-placed-cnt').textContent=n;
}
function updateHint(){
  const mob=window.innerWidth<=700;
  document.getElementById('hint').textContent=S.items.length===0
    ?(mob?'לחץ על מוצר ← הנח בחדר ← גרור באצבע':'👇 בחר מוצר ולחץ "שים בחדר" — ואז גרור לאן שתרצה')
    :(mob?'גרור • צבט לשינוי גודל • ↺↻ לסיבוב':'גרור מוצרים • משוך פינה לשינוי גודל • ↺↻ לסיבוב');
}

function openSheet(){document.getElementById('bsheet').classList.add('open');document.getElementById('sbd').classList.add('show');}
function closeSheet(){document.getElementById('bsheet').classList.remove('open');document.getElementById('sbd').classList.remove('show');}
function setupSheetSwipe(){
  const sheet=document.getElementById('bsheet');
  let sy=null,st=null;
  sheet.addEventListener('touchstart',e=>{
    if(e.target.closest('#m-grid')||e.target.closest('#m-placed')||e.target.closest('.m-cats')||e.target.closest('.m-prs-wrap'))return;
    sy=e.touches[0].clientY;st=Date.now();
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(sy===null)return;
    const dy=e.touches[0].clientY-sy;
    if(dy>0)sheet.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  sheet.addEventListener('touchend',e=>{
    if(sy===null)return;
    const dy=e.changedTouches[0].clientY-sy;
    const dt=Date.now()-st;
    sheet.style.transform='';
    if(dy>80||(dy>30&&dt<200))closeSheet();
    sy=null;
  },{passive:true});
}

function addCart(p){
  const ex=S.cart.find(c=>c.id===p.id);
  if(ex)ex.qty++;else S.cart.push({...p,qty:1});
  renderCart();
}
function removeCart(id){S.cart=S.cart.filter(c=>c.id!==id);renderCart();}
function changeQty(id,d){const c=S.cart.find(x=>x.id===id);if(c)c.qty=Math.max(1,c.qty+d);renderCart();}
function renderCart(){
  const total=S.cart.reduce((s,c)=>s+c.price*c.qty,0);
  const count=S.cart.reduce((s,c)=>s+c.qty,0);
  const badge=document.getElementById('cart-cnt');
  badge.textContent=count;badge.style.display=count>0?'flex':'none';
  document.getElementById('cart-total').textContent='₪'+total.toLocaleString();
  document.getElementById('cart-foot').style.display=S.cart.length?'block':'none';
  const el=document.getElementById('cart-items');
  if(!S.cart.length){el.innerHTML='<div class="cart-empty-msg">🛒 הסל ריק</div>';return;}
  el.innerHTML=S.cart.map(item=>`<div class="citem">
    <img class="cimg" src="${item.img}" alt="${item.name}" referrerpolicy="no-referrer">
    <div style="flex:1;min-width:0;">
      <div class="cname">${item.name}</div>
      <div class="cprice">₪${item.price.toLocaleString()} × ${item.qty}</div>
    </div>
    <div class="cqty">
      <button class="qbtn" onclick="changeQty('${item.id}',-1)">−</button>
      <span class="qnum">${item.qty}</span>
      <button class="qbtn" onclick="changeQty('${item.id}',1)">+</button>
      <button class="crm" onclick="removeCart('${item.id}')">✕</button>
    </div>
  </div>`).join('');
  const params=S.cart.map(c=>`items[][id]=${encodeURIComponent(c.sid)}&items[][quantity]=${c.qty}`).join('&');
  document.getElementById('checkout-link').href=`https://buonacasa.co.il/cart?${params}`;
}
function openCart(){document.getElementById('cart-ov').classList.add('open');renderCart();}
function closeCart(){document.getElementById('cart-ov').classList.remove('open');}

window.addEventListener('resize',updateHint);
init();
</script>
</body>
</html>
