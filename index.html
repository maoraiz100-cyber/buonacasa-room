<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="robots" content="index, follow">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Buona Casa — מעצב החלל שלך | הנח מוצרים בחדר שלך לפני הקנייה</title>
<meta name="description" content="עצב את הבית שלך לפני הקנייה! הנח מוצרי Buona Casa — פחים מעוצבים, סירים, מדפים ועוד — בתמונת החדר שלך וראה איך זה נראה בלייב.">
<meta name="keywords" content="עיצוב הבית, פחי אשפה מעוצבים, Buona Casa, מעצב חלל, סירים, מדפים, כלי בית">
<meta property="og:title" content="Buona Casa — עצב את הבית שלך לפני הקנייה">
<meta property="og:description" content="הנח מוצרים בתמונת החדר שלך וראה איך זה נראה — לפני שאתה קונה!">
<meta property="og:type" content="website">
<meta property="og:url" content="https://buonacasa.co.il">
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;font-family:'Heebo',sans-serif;direction:rtl;overflow:hidden;background:#f7f5f2;color:#1a1a1a;}
::-webkit-scrollbar{width:4px;height:4px;}::-webkit-scrollbar-track{background:transparent;}::-webkit-scrollbar-thumb{background:#ddd;border-radius:4px;}

/* ══ HEADER ══ */
#header{background:#fff;height:56px;display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;border-bottom:1px solid #e8e4de;position:relative;z-index:100;}
.logo{display:flex;align-items:center;gap:10px;text-decoration:none;}
.logo-mark{width:34px;height:34px;background:#1e1e1e;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#fff;font-size:13px;font-weight:700;flex-shrink:0;}
.logo-name{font-size:15px;font-weight:700;color:#1a1a1a;line-height:1.1;}
.logo-sub{font-size:10px;color:#aaa;line-height:1;}
.hdr-right{display:flex;align-items:center;gap:8px;}
.hbtn{height:36px;padding:0 13px;border-radius:9px;border:none;font-family:'Heebo',sans-serif;font-size:12px;font-weight:500;cursor:pointer;display:flex;align-items:center;gap:6px;white-space:nowrap;touch-action:manipulation;}
.hbtn-ghost{background:#f5f3f0;color:#555;}
.hbtn-dark{background:#1e1e1e;color:#fff;}
.cart-dot{background:#d95f38;color:#fff;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;font-weight:700;flex-shrink:0;}
.back-link{font-size:12px;color:#aaa;text-decoration:none;display:flex;align-items:center;gap:4px;}
.back-link:hover{color:#1a1a1a;}

/* ══ LAYOUT SHELL ══ */
#app{display:flex;height:calc(100vh - 56px);overflow:hidden;}

/* ══ SIDEBAR (desktop) ══ */
#sidebar{width:276px;background:#fff;border-left:1px solid #e8e4de;display:flex;flex-direction:column;overflow:hidden;flex-shrink:0;transition:transform .3s;}
.tabs{display:flex;border-bottom:1px solid #e8e4de;flex-shrink:0;}
.tab{flex:1;padding:11px 4px;border:none;background:#fff;font-family:'Heebo',sans-serif;font-size:11.5px;font-weight:400;color:#999;cursor:pointer;border-bottom:2.5px solid transparent;transition:all .15s;touch-action:manipulation;}
.tab.active{background:#faf8f5;color:#1a1a1a;font-weight:600;border-bottom-color:#1e1e1e;}
.cats-wrap{padding:10px 12px 8px;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;flex-shrink:0;border-bottom:1px solid #f0ede8;}
.cats-wrap::-webkit-scrollbar{display:none;}
.cat-btn{display:inline-block;padding:4px 11px;border-radius:20px;border:1px solid #ddd;background:#fff;font-family:'Heebo',sans-serif;font-size:11px;color:#666;cursor:pointer;margin-left:5px;transition:all .15s;touch-action:manipulation;}
.cat-btn.active{background:#1e1e1e;color:#fff;border-color:#1e1e1e;}
#panel-catalog{display:flex;flex-direction:column;flex:1;overflow:hidden;}
#product-list{flex:1;overflow-y:auto;padding:6px 12px 12px;}
.prod-card{display:flex;gap:10px;padding:9px 0;border-bottom:1px solid #f0ede8;align-items:center;}
.prod-thumb{width:60px;height:60px;object-fit:contain;border-radius:8px;background:#f8f6f2;flex-shrink:0;padding:4px;}
.prod-info{flex:1;min-width:0;}
.prod-name{font-size:11.5px;font-weight:500;color:#1a1a1a;line-height:1.3;margin-bottom:2px;}
.prod-price{font-size:12px;color:#d95f38;font-weight:600;}
.prod-btns{display:flex;gap:4px;margin-top:5px;}
.pbtn{padding:4px 8px;border-radius:7px;font-family:'Heebo',sans-serif;font-size:10px;font-weight:500;cursor:pointer;touch-action:manipulation;border:none;}
.pbtn-place{background:#1e1e1e;color:#fff;border:1px solid #1e1e1e;}
.pbtn-place:hover{background:#333;}
.pbtn-cart{background:#d95f38;color:#fff;}
.pbtn-cart:hover{background:#c4522e;}
#panel-placed{display:none;flex:1;overflow-y:auto;padding:6px 12px 12px;}
.pl-card{padding:8px 4px;border-bottom:1px solid #f0ede8;}
.pl-inner{display:flex;gap:9px;align-items:center;}
.pl-thumb{width:46px;height:46px;object-fit:contain;border-radius:7px;background:#f8f6f2;flex-shrink:0;}
.pl-name{font-size:11.5px;font-weight:500;color:#1a1a1a;line-height:1.3;}
.pl-sub{font-size:10px;color:#bbb;margin-top:1px;}
.pl-rmv{border:none;background:transparent;font-size:17px;color:#ddd;cursor:pointer;padding:5px;touch-action:manipulation;line-height:1;}
.pl-rmv:hover{color:#d95f38;}
.pl-controls{padding:6px 0 2px;display:none;}
.pl-controls.show{display:block;}
.sl-lbl{font-size:10px;color:#aaa;margin-bottom:3px;}
input[type=range]{width:100%;accent-color:#d95f38;cursor:pointer;}
.pl-add-btn{width:100%;margin-top:6px;padding:7px 0;border-radius:8px;border:none;background:#d95f38;color:#fff;font-family:'Heebo',sans-serif;font-size:11.5px;font-weight:500;cursor:pointer;touch-action:manipulation;}
.empty-msg{text-align:center;color:#ccc;padding:36px 12px;font-size:12.5px;line-height:1.7;}
.empty-icon{font-size:38px;margin-bottom:8px;}
#presets-bar{border-top:1px solid #e8e4de;padding:10px 12px;flex-shrink:0;}
.presets-label{font-size:10px;color:#aaa;margin-bottom:7px;}
.presets-btns{display:flex;gap:6px;flex-wrap:wrap;}
.prs-btn{padding:5px 11px;border-radius:8px;border:1.5px solid #e0ddd8;background:#fff;font-family:'Heebo',sans-serif;font-size:11px;color:#555;cursor:pointer;touch-action:manipulation;transition:all .15s;}
.prs-btn.active{border-color:#1e1e1e;background:#f0ede8;font-weight:600;}

/* ══ CANVAS ══ */
#canvas-wrap{flex:1;position:relative;overflow:hidden;}
#room-canvas{width:100%;height:100%;position:relative;overflow:hidden;background:#f0ece4;background-size:cover;background-position:center;touch-action:none;}
#hint-bar{position:absolute;top:12px;left:50%;transform:translateX(-50%);z-index:20;background:rgba(255,255,255,.92);backdrop-filter:blur(6px);border-radius:20px;padding:6px 16px;font-size:11.5px;color:#555;box-shadow:0 2px 10px rgba(0,0,0,.1);white-space:nowrap;pointer-events:none;max-width:90%;text-align:center;}
.room-ph{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;pointer-events:none;gap:6px;}
.room-ph-icon{font-size:80px;opacity:.15;}
.room-ph-txt{font-size:13px;color:rgba(0,0,0,.2);}

/* ══ PLACED ITEMS ══ */
.placed-item{position:absolute;touch-action:none;user-select:none;}
.placed-item img{width:100%;height:100%;object-fit:contain;display:block;pointer-events:none;filter:drop-shadow(0 4px 14px rgba(0,0,0,.2));}
.item-ring{position:absolute;inset:-3px;border:2.5px solid transparent;border-radius:5px;pointer-events:none;}
.placed-item.sel .item-ring{border-color:#d95f38;}
.item-lbl{position:absolute;bottom:calc(100%+5px);right:0;background:#1e1e1e;color:#fff;font-size:9px;padding:2px 7px;border-radius:4px;white-space:nowrap;display:none;font-family:'Heebo',sans-serif;}
.placed-item.sel .item-lbl{display:block;}
.item-del{position:absolute;top:-11px;right:-11px;width:24px;height:24px;border-radius:50%;border:none;background:#d95f38;color:#fff;font-size:11px;cursor:pointer;display:none;align-items:center;justify-content:center;font-weight:700;box-shadow:0 2px 6px rgba(0,0,0,.25);z-index:10;touch-action:manipulation;}
.placed-item.sel .item-del{display:flex;}
/* desktop resize handle */

.item-rot-l,.item-rot-r{position:absolute;bottom:-13px;width:24px;height:24px;border-radius:50%;border:none;background:#fff;color:#1e1e1e;font-size:14px;cursor:pointer;display:none;align-items:center;justify-content:center;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:10;touch-action:manipulation;padding:0;line-height:1;}
.item-rot-l{right:30px;}
.item-rot-r{right:2px;}
.placed-item.sel .item-rot-l,.placed-item.sel .item-rot-r{display:flex;}
.item-resize{position:absolute;bottom:-7px;left:-7px;width:16px;height:16px;border-radius:50%;background:#fff;border:2px solid #d95f38;cursor:se-resize;display:none;box-shadow:0 1px 4px rgba(0,0,0,.2);z-index:10;}
.placed-item.sel .item-resize{display:block;}
/* mobile pinch hint */
.item-pinch{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:9px;color:#d95f38;white-space:nowrap;display:none;background:rgba(255,255,255,.88);padding:1px 7px;border-radius:10px;pointer-events:none;}
.placed-item.sel .item-pinch{display:block;}

/* ══ MOBILE FAB ══ */
#fab{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);z-index:150;background:#1e1e1e;color:#fff;border:none;border-radius:30px;padding:14px 28px;font-family:'Heebo',sans-serif;font-size:15px;font-weight:600;cursor:pointer;box-shadow:0 4px 24px rgba(0,0,0,.4);display:flex;align-items:center;gap:8px;touch-action:manipulation;white-space:nowrap;}

/* ══ BOTTOM SHEET (mobile) ══ */
#sheet-bd{position:fixed;inset:0;background:rgba(0,0,0,.38);z-index:200;opacity:0;pointer-events:none;transition:opacity .25s;}
#sheet-bd.show{opacity:1;pointer-events:auto;}
#bsheet{position:fixed;bottom:0;left:0;right:0;background:#fff;border-radius:20px 20px 0 0;z-index:201;transform:translateY(100%);transition:transform .3s cubic-bezier(.32,1,.23,1);max-height:78vh;display:flex;flex-direction:column;box-shadow:0 -4px 32px rgba(0,0,0,.18);}
#bsheet.open{transform:translateY(0);}
.bs-handle-row{padding:10px 0 0;display:flex;justify-content:center;flex-shrink:0;}
.bs-handle{width:36px;height:4px;background:#e0ddd8;border-radius:2px;}
.bs-hdr{padding:12px 16px 0;display:flex;align-items:center;justify-content:space-between;flex-shrink:0;}
.bs-title{font-size:16px;font-weight:700;}
.bs-close{border:none;background:transparent;font-size:22px;color:#bbb;cursor:pointer;padding:4px;line-height:1;touch-action:manipulation;}
.bs-tabs{display:flex;padding:10px 14px 0;gap:7px;flex-shrink:0;}
.bstab{flex:1;padding:8px 4px;border:none;background:#f5f3f0;border-radius:10px;font-family:'Heebo',sans-serif;font-size:11.5px;font-weight:500;color:#888;cursor:pointer;transition:all .15s;touch-action:manipulation;}
.bstab.active{background:#1e1e1e;color:#fff;}
/* mobile grid */
#m-product-grid{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 12px 24px;display:grid;grid-template-columns:1fr 1fr;gap:9px;}
#m-product-grid::-webkit-scrollbar{display:none;}
.m-prod-card{background:#f8f6f2;border-radius:13px;overflow:hidden;display:flex;flex-direction:column;}
.m-prod-img{height:160px;background:#f0ede8;display:flex;align-items:center;justify-content:center;padding:12px;overflow:hidden;border-radius:10px 10px 0 0;}
.m-prod-img img{max-width:100%;max-height:100%;width:auto;height:auto;object-fit:contain;}
.m-prod-body{padding:8px 9px 10px;}
.m-prod-name{font-size:10.5px;font-weight:500;color:#1a1a1a;line-height:1.35;margin-bottom:3px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.m-prod-price{font-size:12px;color:#d95f38;font-weight:700;margin-bottom:6px;}
.m-prod-btns{display:flex;gap:4px;}
.mpbtn{flex:1;padding:7px 4px;border-radius:8px;font-family:'Heebo',sans-serif;font-size:10px;font-weight:500;cursor:pointer;border:none;text-align:center;touch-action:manipulation;}
.mpbtn-place{background:#1e1e1e;color:#fff;}
.mpbtn-cart{background:#d95f38;color:#fff;}
/* mobile cats */
.m-cats-wrap{padding:10px 14px 0;overflow-x:auto;white-space:nowrap;-webkit-overflow-scrolling:touch;flex-shrink:0;}
.m-cats-wrap::-webkit-scrollbar{display:none;}
.m-cat-btn{display:inline-block;padding:5px 13px;border-radius:20px;border:1px solid #ddd;background:#fff;font-family:'Heebo',sans-serif;font-size:11.5px;color:#666;cursor:pointer;margin-left:6px;transition:all .15s;touch-action:manipulation;}
.m-cat-btn.active{background:#1e1e1e;color:#fff;border-color:#1e1e1e;}
/* mobile placed */
#m-placed-panel{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:8px 14px 24px;}
#m-placed-panel::-webkit-scrollbar{display:none;}
/* mobile presets */
.m-presets-wrap{flex:1;overflow-y:auto;padding:12px 14px 24px;}
.m-preset-grid{display:grid;grid-template-columns:1fr 1fr;gap:9px;margin-bottom:16px;}
.m-prs-btn{padding:14px 0;border-radius:12px;border:1.5px solid #e0ddd8;background:#fff;font-family:'Heebo',sans-serif;font-size:13px;color:#555;cursor:pointer;text-align:center;touch-action:manipulation;transition:all .15s;}
.m-prs-btn.active{border-color:#1e1e1e;background:#f0ede8;font-weight:600;}
.m-upload-label{display:block;width:100%;padding:14px 0;border-radius:12px;border:1.5px dashed #bbb;background:#f8f6f2;text-align:center;font-size:13px;color:#666;cursor:pointer;touch-action:manipulation;}

/* ══ CART DRAWER ══ */
#cart-overlay{position:fixed;inset:0;z-index:400;display:flex;opacity:0;pointer-events:none;transition:opacity .2s;}
#cart-overlay.open{opacity:1;pointer-events:auto;}
#cart-back{flex:1;background:rgba(0,0,0,.32);}
#cart-drawer{width:min(340px,94vw);background:#fff;display:flex;flex-direction:column;padding:20px 16px;overflow-y:auto;-webkit-overflow-scrolling:touch;box-shadow:-4px 0 28px rgba(0,0,0,.14);}
.cd-hdr{display:flex;justify-content:space-between;align-items:center;margin-bottom:18px;}
.cd-title{font-size:17px;font-weight:700;}
.cd-x{border:none;background:transparent;font-size:22px;color:#bbb;cursor:pointer;touch-action:manipulation;}
.c-item{display:flex;gap:11px;padding:10px 0;border-bottom:1px solid #f0ede8;align-items:center;}
.c-img{width:48px;height:48px;object-fit:contain;border-radius:8px;background:#f8f6f2;flex-shrink:0;}
.c-name{font-size:12px;font-weight:500;color:#1a1a1a;line-height:1.3;}
.c-price{font-size:12px;color:#d95f38;font-weight:600;margin-top:2px;}
.c-qty{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.qbtn{width:26px;height:26px;border-radius:50%;border:1px solid #ddd;background:#fff;font-size:15px;cursor:pointer;display:flex;align-items:center;justify-content:center;touch-action:manipulation;}
.qnum{font-size:13px;font-weight:500;min-width:18px;text-align:center;}
.c-rm{border:none;background:transparent;font-size:15px;color:#ddd;cursor:pointer;padding:5px;touch-action:manipulation;}
.cart-foot{margin-top:16px;border-top:1px solid #e8e4de;padding-top:16px;}
.cart-total-row{display:flex;justify-content:space-between;font-size:15px;font-weight:700;margin-bottom:14px;}
.cart-total-amt{color:#d95f38;}
.btn-checkout{display:block;width:100%;padding:14px 0;border-radius:12px;background:#1e1e1e;color:#fff;text-align:center;text-decoration:none;font-family:'Heebo',sans-serif;font-size:14px;font-weight:600;transition:opacity .15s;}
.btn-checkout:hover{opacity:.88;}
.cart-empty{text-align:center;color:#ccc;padding:40px 0;font-size:13px;}

/* ══ RESPONSIVE BREAKPOINT ══ */
@media(max-width:700px){
  #sidebar{display:none;}
  .back-link{display:none;}
  #upload-btn-hdr span{display:none;}
}
@media(min-width:701px){
  #fab{display:none;}
  #bsheet{display:none!important;}
  #sheet-bd{display:none!important;}
  .item-pinch{display:none!important;}
}
</style>
</head>
<body>

<!-- HEADER -->
<div id="header">
  <div style="display:flex;align-items:center;gap:14px;">
    <a href="https://buonacasa.co.il" class="back-link">← חזור לחנות</a>
    <a href="https://buonacasa.co.il" class="logo">
      <div class="logo-mark">BC</div>
      <div>
        <div class="logo-name">Buona Casa</div>
        <div class="logo-sub">מעצב החלל שלך</div>
      </div>
    </a>
  </div>
  <div class="hdr-right">
    <button id="upload-btn-hdr" class="hbtn hbtn-ghost" onclick="document.getElementById('file-input').click()">📷 <span>העלה תמונה</span></button>
    <button class="hbtn hbtn-dark" onclick="openCart()">🛒 <span class="cart-dot" id="cart-count" style="display:none">0</span></button>
  </div>
</div>
<input type="file" id="file-input" accept="image/*" capture="environment" onchange="handleUpload(event)" style="display:none">

<!-- APP -->
<div id="app">

  <!-- DESKTOP SIDEBAR -->
  <div id="sidebar">
    <div class="tabs">
      <button class="tab active" id="tab-cat" onclick="switchTab('cat')">🛍️ קטלוג</button>
      <button class="tab" id="tab-placed" onclick="switchTab('placed')">✏️ בחלל (<span id="placed-count">0</span>)</button>
    </div>

    <div id="panel-catalog">
      <div class="cats-wrap" id="d-cats"></div>
      <div id="product-list"></div>
    </div>

    <div id="panel-placed"></div>

    <div id="presets-bar">
      <div class="presets-label">רקע חדר</div>
      <div class="presets-btns" id="d-presets"></div>
    </div>
  </div>

  <!-- CANVAS -->
  <div id="canvas-wrap">
    <div id="room-canvas">
      <div class="room-ph" id="room-ph">
        <div class="room-ph-icon" id="ph-icon">🛋️</div>
        <div class="room-ph-txt">העלה תמונת חדר או בחר מוצר</div>
      </div>
    </div>
    <div id="hint-bar">👇 בחר מוצר ולחץ "שים בחדר" — ואז גרור לאן שתרצה</div>
  </div>
</div>

<!-- MOBILE FAB -->
<button id="fab" onclick="openSheet()">🛍️ מוצרים</button>

<!-- MOBILE SHEET BACKDROP -->
<div id="sheet-bd" onclick="closeSheet()"></div>

<!-- MOBILE BOTTOM SHEET -->
<div id="bsheet">
  <div class="bs-handle-row"><div class="bs-handle"></div></div>
  <div class="bs-hdr">
    <div class="bs-title">בחר מוצר</div>
    <button class="bs-close" onclick="closeSheet()">✕</button>
  </div>
  <div class="bs-tabs">
    <button class="bstab active" id="bstab-cat" onclick="switchBsTab('cat')">🛍️ קטלוג</button>
    <button class="bstab" id="bstab-placed" onclick="switchBsTab('placed')">✏️ בחלל (<span id="m-placed-count">0</span>)</button>
    <button class="bstab" id="bstab-room" onclick="switchBsTab('room')">🏠 חדר</button>
  </div>
  <div id="bs-panel-cat" style="display:flex;flex-direction:column;flex:1;overflow:hidden;">
    <div class="m-cats-wrap" id="m-cats"></div>
    <div id="m-product-grid"></div>
  </div>
  <div id="bs-panel-placed" style="display:none;flex:1;overflow:hidden;flex-direction:column;">
    <div id="m-placed-panel"></div>
  </div>
  <div id="bs-panel-room" style="display:none;flex:1;overflow:hidden;">
    <div class="m-presets-wrap">
      <div class="m-preset-grid" id="m-presets"></div>
      <label for="file-input" class="m-upload-label">📷 צלם את החדר שלך</label>
    </div>
  </div>
</div>

<!-- CART -->
<div id="cart-overlay">
  <div id="cart-back" onclick="closeCart()"></div>
  <div id="cart-drawer">
    <div class="cd-hdr">
      <div class="cd-title">🛒 סל קניות</div>
      <button class="cd-x" onclick="closeCart()">✕</button>
    </div>
    <div id="cart-items-el" style="flex:1;overflow-y:auto;"></div>

/* ══ UPLOAD ══ */
function handleUpload(e){
  const f=e.target.files[0];if(!f)return;
  const url=URL.createObjectURL(f);S.roomImage=url;
  const c=document.getElementById('room-canvas');
  c.style.backgroundImage=`url(${url})`;c.style.backgroundColor='';
  document.getElementById('room-ph').style.display='none';
  renderDPresets();renderMPresets();
}

/* ══ PRESETS ══ */
function applyPreset(p,closeSheet){
  S.preset=p;S.roomImage=null;
  const c=document.getElementById('room-canvas');
  c.style.backgroundImage='none';c.style.backgroundColor=p.bg;
  document.getElementById('ph-icon').textContent=p.emoji;
  document.getElementById('room-ph').style.display='flex';
  renderDPresets();renderMPresets();
  if(closeSheet)closeSheetFn();
}
function renderDPresets(){
  const dpEl=document.getElementById('d-presets');
  dpEl.innerHTML=PRESETS.map(p=>`<button class="prs-btn${p.label===S.preset.label&&!S.roomImage?' active':''}" data-act="preset" data-label="${p.label}">${p.emoji} ${p.label}</button>`).join('');
  dpEl.onclick=handlePresetClick;
}

}

}
function renderMProducts(){
  const list=S.mCat==='הכל'?PRODUCTS:PRODUCTS.filter(p=>p.cat===S.mCat);
  const el=document.getElementById('m-product-grid');
  el.innerHTML=list.map(p=>`
    <div class="m-prod-card">
      <div class="m-prod-img" style="background:#f0ede8;"><img src="${p.image}" alt="${p.name}" loading="eager" decoding="async" referrerpolicy="no-referrer" crossorigin="anonymous" onerror="this.style.display='none';this.parentElement.innerHTML='<div style=\'font-size:32px;opacity:.3;\'>🏠</div>'"></div>
      <div class="m-prod-body">
        <div class="m-prod-name">${p.name}</div>
        <div class="m-prod-price">\u20aa${p.price.toLocaleString()}</div>
        <div class="m-prod-btns">
          <button class="mpbtn mpbtn-place" data-pid="${p.id}" data-act="place" data-mob="1">+ חדר</button>
          <button class="mpbtn mpbtn-cart" data-pid="${p.id}" data-act="cart">+ סל</button>
        </div>
      </div>
    </div>`).join('');
  el.onclick=handleProdClick;
}

/* ══ PLACE ══ */
function place(p,isMobile){
  const canvas=document.getElementById('room-canvas');
  const rect=canvas.getBoundingClientRect();
  const scale=isMobile?Math.min(1,rect.width/380)*1.1:1;
  const w=Math.round(p.w*scale);const h=Math.round(p.h*scale);
  const item={id:S.ctr++,p,x:Math.round((rect.width-w)/2),y:Math.round((rect.height-h)/2),w,h,opacity:1,rot:0};
  S.items.push(item);S.selId=item.id;
  mountItem(item);updateCounts();updateHint();
  if(isMobile)closeSheetFn();
}

function mountItem(item){
  const canvas=document.getElementById('room-canvas');
  const div=document.createElement('div');
  div.className='placed-item sel';div.id=`item-${item.id}`;
  div.style.cssText=`left:${item.x}px;top:${item.y}px;width:${item.w}px;height:${item.h}px;opacity:${item.opacity};transform:rotate(${item.rot||0}deg);transform-origin:center center;`;
  div.innerHTML=`<img src="${item.p.image}" alt="${item.p.name}" draggable="false" referrerpolicy="no-referrer" crossorigin="anonymous">
    <div class="item-ring"></div>
    <div class="item-lbl">${item.p.name}</div>
    <div class="item-pinch">🤏 צבט לשינוי גודל</div>
    <button class="item-del" onclick="removeItem(${item.id})" ontouchend="removeItem(${item.id})">✕</button>
    <div class="item-resize" data-id="${item.id}"></div>
    <button class="item-rot-l" onclick="rotateItem(${item.id},-15)" ontouchend="rotateItem(${item.id},-15)">↺</button>
    <button class="item-rot-r" onclick="rotateItem(${item.id},15)" ontouchend="rotateItem(${item.id},15)">↻</button>`;
  div.addEventListener('mousedown',e=>onItemMouseDown(e,item.id));
  div.querySelector('.item-resize').addEventListener('mousedown',e=>onResizeMouseDown(e,item.id));
  attachTouch(div,item.id);
  canvas.appendChild(div);
  deselectAll();div.classList.add('sel');
  renderBothPlaced();
}

function removeItem(id){
  S.items=S.items.filter(it=>it.id!==id);
  const el=document.getElementById(`item-${id}`);if(el)el.remove();
  if(S.selId===id)S.selId=null;
  updateCounts();renderBothPlaced();updateHint();
}

function deselectAll(){document.querySelectorAll('.placed-item').forEach(el=>el.classList.remove('sel'));S.selId=null;}
function selectItem(id){deselectAll();S.selId=id;const el=document.getElementById(`item-${id}`);if(el)el.classList.add('sel');renderBothPlaced();}

/* ══ MOUSE DRAG (desktop) ══ */
function onItemMouseDown(e,id){
  if(e.button!==0)return;
  e.stopPropagation();selectItem(id);
  const el=document.getElementById(`item-${id}`);
  const rect=el.getBoundingClientRect();
  const cr=document.getElementById('room-canvas').getBoundingClientRect();
  S.drag={id,ox:e.clientX-(rect.left-cr.left),oy:e.clientY-(rect.top-cr.top)};
}
function onResizeMouseDown(e,id){
  e.stopPropagation();e.preventDefault();
  const item=S.items.find(it=>it.id===id);
  S.resize={id,sx:e.clientX,sy:e.clientY,sw:item.w,sh:item.h};
}
function setupMouse(){
  document.addEventListener('mousemove',e=>{
    if(S.drag){
      const item=S.items.find(it=>it.id===S.drag.id);if(!item)return;
      const cr=document.getElementById('room-canvas').getBoundingClientRect();
      item.x=Math.max(0,Math.min(cr.width-item.w,e.clientX-cr.left-S.drag.ox));
      item.y=Math.max(0,Math.min(cr.height-item.h,e.clientY-cr.top-S.drag.oy));
      const el=document.getElementById(`item-${item.id}`);
      if(el){el.style.left=item.x+'px';el.style.top=item.y+'px';}
      updatePlacedSize(item);
    }
    if(S.resize){
      const item=S.items.find(it=>it.id===S.resize.id);if(!item)return;
      item.w=Math.max(40,S.resize.sw+(e.clientX-S.resize.sx));
      item.h=Math.max(40,S.resize.sh+(e.clientY-S.resize.sy));
      const el=document.getElementById(`item-${item.id}`);
      if(el){el.style.width=item.w+'px';el.style.height=item.h+'px';}
      updatePlacedSize(item);
    }
  });
  document.addEventListener('mouseup',()=>{S.drag=null;S.resize=null;});
}

/* ══ TOUCH DRAG + PINCH (mobile) ══ */
function attachTouch(div,id){
  let sx=null,sy=null,sd=null,sw=null,sh=null;
  div.addEventListener('touchstart',e=>{
    e.stopPropagation();selectItem(id);
    const item=S.items.find(it=>it.id===id);if(!item)return;
    const t=e.touches;
    if(t.length===1){
      const el=document.getElementById(`item-${id}`);
      const r=el.getBoundingClientRect();
      const cr=document.getElementById('room-canvas').getBoundingClientRect();
      sx=t[0].clientX-(r.left-cr.left);sy=t[0].clientY-(r.top-cr.top);
    } else if(t.length===2){
      const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;
      sd=Math.sqrt(dx*dx+dy*dy);sw=item.w;sh=item.h;sx=null;
    }
  },{passive:true});
  div.addEventListener('touchmove',e=>{
    e.preventDefault();e.stopPropagation();
    const item=S.items.find(it=>it.id===id);if(!item)return;
    const el=document.getElementById(`item-${id}`);if(!el)return;
    const cr=document.getElementById('room-canvas').getBoundingClientRect();
    const t=e.touches;
    if(t.length===1&&sx!==null){
      item.x=Math.max(0,Math.min(cr.width-item.w,t[0].clientX-cr.left-sx));
      item.y=Math.max(0,Math.min(cr.height-item.h,t[0].clientY-cr.top-sy));
      el.style.left=item.x+'px';el.style.top=item.y+'px';
    } else if(t.length===2&&sd){
      const dx=t[0].clientX-t[1].clientX,dy=t[0].clientY-t[1].clientY;
      const r=Math.sqrt(dx*dx+dy*dy)/sd;
      item.w=Math.max(40,Math.round(sw*r));item.h=Math.max(40,Math.round(sh*r));
      el.style.width=item.w+'px';el.style.height=item.h+'px';
    }
    updatePlacedSize(item);
  },{passive:false});
  div.addEventListener('touchend',e=>{
    if(e.touches.length===0){sx=null;sd=null;}
    if(e.touches.length===1&&sd){
      const el=document.getElementById(`item-${id}`);
      const r=el.getBoundingClientRect();
      const cr=document.getElementById('room-canvas').getBoundingClientRect();
      sx=e.touches[0].clientX-(r.left-cr.left);sy=e.touches[0].clientY-(r.top-cr.top);sd=null;
    }
  },{passive:true});
}

/* ══ PLACED LISTS ══ */
function renderBothPlaced(){renderDPlaced();renderMPlaced();}

function placedHTML(item){
  return `<div class="pl-card" id="plc-${item.id}">
    <div class="pl-inner" onclick="selectItem(${item.id})" style="cursor:pointer">
      <img class="pl-thumb" src="${item.p.image}" alt="${item.p.name}" referrerpolicy="no-referrer" crossorigin="anonymous">
      <div class="pl-info">
        <div class="pl-name">${item.p.name}</div>
        <div class="pl-sub" id="psize-${item.id}">${Math.round(item.w)}×${Math.round(item.h)}</div>
      </div>
      <button class="pl-rmv" onclick="removeItem(${item.id})">✕</button>
    </div>
    <div class="pl-controls${S.selId===item.id?' show':''}">
      <div class="sl-lbl">שקיפות</div>
      <input type="range" min="0.15" max="1" step="0.05" value="${item.opacity}" oninput="setOpacity(${item.id},this.value)">
      <button class="pl-add-btn" data-pid="${item.p.id}" data-act="cart-placed">הוסף לסל — ₪${item.p.price.toLocaleString()}</button>
    </div>
  </div>`;
}

function renderDPlaced(){
  const el=document.getElementById('panel-placed');
  if(S.items.length===0){el.innerHTML='<div class="empty-msg"><div class="empty-icon">✨</div>עדיין לא הנחת מוצרים</div>';return;}
  el.innerHTML=S.items.map(it=>placedHTML(it)).join('');el.onclick=handlePlacedClick;el.onclick=handlePlacedClick;
}
function renderMPlaced(){
  const el=document.getElementById('m-placed-panel');
  if(S.items.length===0){el.innerHTML='<div class="empty-msg"><div class="empty-icon">✨</div>עדיין לא הנחת מוצרים</div>';return;}
  el.innerHTML=S.items.map(it=>placedHTML(it)).join('');el.onclick=handlePlacedClick;el.onclick=handlePlacedClick;
}

function updatePlacedSize(item){
  document.querySelectorAll(`#psize-${item.id}`).forEach(el=>el.textContent=`${Math.round(item.w)}×${Math.round(item.h)}`);
}

function setOpacity(id,v){
  const item=S.items.find(it=>it.id===id);if(!item)return;
  item.opacity=parseFloat(v);
  const el=document.getElementById(`item-${id}`);if(el)el.style.opacity=v;
}

/* ══ TABS ══ */
function switchTab(t){
  S.dTab=t;
  ['cat','placed'].forEach(x=>{
    document.getElementById(`tab-${x}`).className='tab'+(x===t?' active':'');
  });
  document.getElementById('panel-catalog').style.display=t==='cat'?'flex':'none';
  document.getElementById('panel-placed').style.display=t==='placed'?'block':'none';
  if(t==='placed')renderDPlaced();
}
function switchBsTab(t){
  S.mTab=t;
  ['cat','placed','room'].forEach(x=>{
    document.getElementById(`bstab-${x}`).className='bstab'+(x===t?' active':'');
    document.getElementById(`bs-panel-${x}`).style.display=x===t?(x==='cat'?'flex':'flex'):'none';
  });
  if(t==='cat')document.getElementById('bs-panel-cat').style.display='flex';
  if(t==='placed'){document.getElementById('bs-panel-placed').style.display='flex';renderMPlaced();}
  if(t==='room')document.getElementById('bs-panel-room').style.display='flex';
}

/* ══ COUNTS & HINT ══ */
function updateCounts(){
  const n=S.items.length;
  document.getElementById('placed-count').textContent=n;
  document.getElementById('m-placed-count').textContent=n;
}
function updateHint(){
  const isMob=window.innerWidth<=700;
  document.getElementById('hint-bar').textContent=S.items.length===0
    ?(isMob?'לחץ על מוצר ← הנח בחדר ← גרור באצבע':'👇 בחר מוצר ולחץ "שים בחדר" — ואז גרור לאן שתרצה')
    :(isMob?'גרור מוצרים • צבט בשתי אצבעות לשינוי גודל • X למחיקה':'גרור מוצרים • משוך פינה לשינוי גודל • לחץ X למחיקה');
}

/* ══ SHEET ══ */
function openSheet(){
  document.getElementById('bsheet').classList.add('open');
  document.getElementById('sheet-bd').classList.add('show');
}
function closeSheet(){
  document.getElementById('bsheet').classList.remove('open');
  document.getElementById('sheet-bd').classList.remove('show');
}
function closeSheetFn(){closeSheet();}
function setupSheetSwipe(){
  const sheet=document.getElementById('bsheet');
  let sy=null,st=null;
  sheet.addEventListener('touchstart',e=>{
    if(e.target.closest('#m-product-grid')||e.target.closest('#m-placed-panel')||e.target.closest('.m-cats-wrap')||e.target.closest('.m-presets-wrap'))return;
    sy=e.touches[0].clientY;st=Date.now();
  },{passive:true});
  sheet.addEventListener('touchmove',e=>{
    if(sy===null)return;
    const dy=e.touches[0].clientY-sy;
    if(dy>0)sheet.style.transform=`translateY(${dy}px)`;
  },{passive:true});
  sheet.addEventListener('touchend',e=>{
    if(sy===null)return;
    const dy=e.changedTouches[0].clientY-sy;
    const dt=Date.now()-st;
    sheet.style.transform='';
    if(dy>80||(dy>30&&dt<200))closeSheetFn();
    sy=null;
  },{passive:true});
}

/* ══ CART ══ */
function addCart(p){
  const ex=S.cart.find(c=>c.id===p.id);
  if(ex)ex.qty++;else S.cart.push({...p,qty:1});
  renderCart();
}
function removeCart(id){S.cart=S.cart.filter(c=>c.id!==id);renderCart();}
function changeQty(id,d){const c=S.cart.find(x=>x.id===id);if(c)c.qty=Math.max(1,c.qty+d);renderCart();}
function renderCart(){
  const total=S.cart.reduce((s,c)=>s+c.price*c.qty,0);
  const count=S.cart.reduce((s,c)=>s+c.qty,0);
  const badge=document.getElementById('cart-count');
  badge.textContent=count;badge.style.display=count>0?'flex':'none';
  document.getElementById('cart-total').textContent='₪'+total.toLocaleString();
  document.getElementById('cart-foot').style.display=S.cart.length?'block':'none';
  const el=document.getElementById('cart-items-el');
  if(!S.cart.length){el.innerHTML='<div class="cart-empty">🛒 הסל ריק</div>';return;}
  el.innerHTML=S.cart.map(item=>`
    <div class="c-item">
      <img class="c-img" src="${item.image}" alt="${item.name}" referrerpolicy="no-referrer" crossorigin="anonymous">
      <div style="flex:1;min-width:0;">
        <div class="c-name">${item.name}</div>
        <div class="c-price">₪${item.price.toLocaleString()} × ${item.qty}</div>
      </div>
      <div class="c-qty">
        <button class="qbtn" onclick="changeQty('${item.id}',-1)">−</button>
        <span class="qnum">${item.qty}</span>
        <button class="qbtn" onclick="changeQty('${item.id}',1)">+</button>
        <button class="c-rm" onclick="removeCart('${item.id}')">✕</button>
      </div>
    </div>`).join('');
  const params=S.cart.map(c=>`items[][id]=${encodeURIComponent(c.sid||c.id)}&items[][quantity]=${c.qty}`).join('&');
  document.getElementById('checkout-link').href=`https://buonacasa.co.il/cart?${params}`;
}
function openCart(){document.getElementById('cart-overlay').classList.add('open');renderCart();}
function closeCart(){document.getElementById('cart-overlay').classList.remove('open');}

/* ══ UTIL ══ */



function handlePresetClick(e){
  const btn=e.target.closest('[data-act="preset"]');
  if(!btn)return;
  const p=PRESETS.find(x=>x.label===btn.dataset.label);
  if(p) applyPreset(p, btn.closest('#m-presets')!==null);
}
function handlePlacedClick(e){
  const btn=e.target.closest('[data-act]');
  if(!btn)return;
  if(btn.dataset.act==='cart-placed'){
    const pid=btn.dataset.pid;
    const item=S.items.find(it=>it.p.id===pid);
    if(item)addCart(item.p);
  }
}
function handleProdClick(e){
  const btn=e.target.closest('[data-act]');
  if(!btn)return;
  const p=PRODUCTS.find(x=>x.id===btn.dataset.pid);
  if(!p)return;
  if(btn.dataset.act==='place') place(p, btn.dataset.mob==='1');
  else addCart(p);
}
function jStr(o){return JSON.stringify(o).replace(/"/g,'&quot;');}

init();

function rotateItem(id, deg){
  const item=S.items.find(it=>it.id===id);if(!item)return;
  item.rot=(item.rot||0)+deg;
  const el=document.getElementById(`item-${id}`);
  if(el) el.style.transform=`rotate(${item.rot}deg)`;
}

window.addEventListener('resize',updateHint);
</script>
